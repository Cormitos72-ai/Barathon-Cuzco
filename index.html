<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barathon</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #f0c040;
    --accent2: #e87040;
    --text: #f0eff8;
    --muted: #6b6a80;
    --done: #2a3a2a;
    --done-border: #3a5a3a;
    --done-text: #70b870;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* ─── SETUP SCREEN ─── */
#setup {
min-height: 100vh;
display: flex;
flex-direction: column;
padding: 24px 20px 40px;
}

.logo {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 2.4rem;
letter-spacing: -0.04em;
line-height: 1;
margin-bottom: 6px;
}
.logo span { color: var(–accent); }

.tagline {
color: var(–muted);
font-size: 0.9rem;
margin-bottom: 36px;
}

.section-label {
font-family: ‘Syne’, sans-serif;
font-size: 0.7rem;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 12px;
}

.bars-list {
display: flex;
flex-direction: column;
gap: 8px;
margin-bottom: 16px;
}

.bar-entry {
display: flex;
align-items: center;
gap: 10px;
background: var(–card);
border: 1px solid var(–border);
border-radius: 14px;
padding: 12px 14px;
animation: slideIn 0.25s ease;
}

@keyframes slideIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

.bar-num {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.85rem;
color: var(–accent);
min-width: 22px;
}

.bar-entry input {
flex: 1;
background: transparent;
border: none;
outline: none;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.95rem;
font-weight: 400;
}
.bar-entry input::placeholder { color: var(–muted); }

.del-btn {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 1.1rem;
padding: 4px;
line-height: 1;
transition: color 0.15s;
}
.del-btn:hover { color: #e05050; }

.add-btn {
display: flex;
align-items: center;
gap: 8px;
background: var(–surface);
border: 1.5px dashed var(–border);
border-radius: 14px;
padding: 12px 16px;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.9rem;
cursor: pointer;
width: 100%;
transition: all 0.15s;
margin-bottom: 28px;
}
.add-btn:hover { border-color: var(–accent); color: var(–accent); }

.start-btn {
background: var(–accent);
color: #0a0a0f;
border: none;
border-radius: 16px;
padding: 18px;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 1.05rem;
letter-spacing: 0.02em;
cursor: pointer;
width: 100%;
transition: all 0.15s;
margin-top: auto;
}
.start-btn:hover { background: #f8d060; transform: translateY(-1px); }
.start-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ─── MARATHON SCREEN ─── */
#marathon {
display: none;
min-height: 100vh;
flex-direction: column;
}

.marathon-header {
padding: 20px 20px 0;
display: flex;
align-items: center;
justify-content: space-between;
}

.marathon-logo {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 1.4rem;
letter-spacing: -0.03em;
}
.marathon-logo span { color: var(–accent); }

.progress-wrap {
padding: 16px 20px 0;
}

.progress-info {
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 8px;
}

.progress-label {
font-family: ‘Syne’, sans-serif;
font-weight: 600;
font-size: 0.85rem;
color: var(–muted);
}

.progress-count {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 1.1rem;
}
.progress-count span { color: var(–accent); }

.progress-bar-bg {
height: 4px;
background: var(–border);
border-radius: 99px;
overflow: hidden;
}

.progress-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(–accent2), var(–accent));
border-radius: 99px;
transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Current bar hero */
.current-bar-wrap {
padding: 20px 20px 0;
}

.current-label {
font-family: ‘Syne’, sans-serif;
font-size: 0.65rem;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 8px;
}

.current-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 22px;
padding: 22px;
position: relative;
overflow: hidden;
animation: heroIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes heroIn {
from { opacity: 0; transform: scale(0.94) translateY(12px); }
to { opacity: 1; transform: scale(1) translateY(0); }
}

.current-card::before {
content: ‘’;
position: absolute;
inset: 0;
background: radial-gradient(ellipse at top right, rgba(240,192,64,0.08) 0%, transparent 60%);
pointer-events: none;
}

.current-bar-num {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 4rem;
line-height: 1;
color: var(–accent);
opacity: 0.18;
position: absolute;
top: 12px;
right: 18px;
}

.current-bar-name {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 1.6rem;
line-height: 1.1;
letter-spacing: -0.02em;
margin-bottom: 16px;
padding-right: 50px;
}

.checkin-btn {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
background: var(–accent);
color: #0a0a0f;
border: none;
border-radius: 14px;
padding: 15px 20px;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.95rem;
cursor: pointer;
width: 100%;
transition: all 0.15s;
}
.checkin-btn:hover { background: #f8d060; }
.checkin-btn.done {
background: var(–done);
color: var(–done-text);
border: 1px solid var(–done-border);
}

/* Bar list below */
.bars-scroll {
padding: 20px 20px 32px;
display: flex;
flex-direction: column;
gap: 8px;
flex: 1;
}

.bars-scroll-label {
font-family: ‘Syne’, sans-serif;
font-size: 0.65rem;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 4px;
}

.bar-item {
display: flex;
align-items: center;
gap: 14px;
padding: 14px 16px;
border-radius: 16px;
border: 1px solid transparent;
transition: all 0.3s ease;
position: relative;
overflow: hidden;
}

.bar-item.locked {
background: var(–surface);
opacity: 0.4;
}

.bar-item.active {
background: var(–card);
border-color: var(–accent);
opacity: 1;
box-shadow: 0 0 0 1px rgba(240,192,64,0.15), 0 4px 24px rgba(240,192,64,0.06);
}

.bar-item.completed {
background: var(–done);
border-color: var(–done-border);
opacity: 1;
}

.bar-item-num {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.8rem;
min-width: 24px;
text-align: center;
}
.bar-item.locked .bar-item-num { color: var(–muted); }
.bar-item.active .bar-item-num { color: var(–accent); }
.bar-item.completed .bar-item-num { color: var(–done-text); }

.bar-item-name {
flex: 1;
font-size: 0.95rem;
font-weight: 500;
}
.bar-item.locked .bar-item-name { color: var(–muted); }
.bar-item.completed .bar-item-name { color: var(–done-text); text-decoration: line-through; }

.bar-item-icon {
font-size: 1rem;
}

/* Lock icon for future */
.lock-icon {
font-size: 0.75rem;
color: var(–border);
}

/* Celebration overlay */
#celebration {
display: none;
position: fixed;
inset: 0;
background: rgba(10,10,15,0.92);
z-index: 100;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: 40px;
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}

.celebration-emoji {
font-size: 4rem;
margin-bottom: 20px;
animation: bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes bounce {
from { transform: scale(0); }
to { transform: scale(1); }
}

.celebration-title {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 2rem;
letter-spacing: -0.03em;
margin-bottom: 10px;
}
.celebration-title span { color: var(–accent); }

.celebration-sub {
color: var(–muted);
font-size: 1rem;
line-height: 1.5;
margin-bottom: 32px;
}

.celebration-close {
background: var(–accent);
color: #0a0a0f;
border: none;
border-radius: 14px;
padding: 15px 32px;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.95rem;
cursor: pointer;
}

/* Finish screen */
#finish {
display: none;
min-height: 100vh;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 40px 24px;
text-align: center;
}

.finish-trophy {
font-size: 5rem;
margin-bottom: 24px;
animation: bounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
}

.finish-title {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 2.2rem;
letter-spacing: -0.04em;
margin-bottom: 10px;
line-height: 1.1;
}
.finish-title span { color: var(–accent); }

.finish-sub {
color: var(–muted);
font-size: 1rem;
margin-bottom: 12px;
}

.finish-bars {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 3rem;
color: var(–accent);
margin-bottom: 6px;
}

.finish-bars-label {
color: var(–muted);
font-size: 0.85rem;
margin-bottom: 36px;
}

.restart-btn {
background: transparent;
border: 1.5px solid var(–border);
color: var(–text);
border-radius: 14px;
padding: 15px 28px;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.9rem;
cursor: pointer;
transition: all 0.15s;
}
.restart-btn:hover { border-color: var(–accent); color: var(–accent); }

/* Confetti */
.confetti-piece {
position: fixed;
width: 8px;
height: 8px;
border-radius: 2px;
animation: confettiFall linear forwards;
pointer-events: none;
z-index: 99;
}

@keyframes confettiFall {
0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>

</head>
<body>

<!-- ══════════ SETUP SCREEN ══════════ -->

<div id="setup">
  <div class="logo">bara<span>thon</span></div>
  <div class="tagline">Ajoute tes bars, c'est parti 🍺</div>

  <div class="section-label">Les bars du parcours</div>
  <div class="bars-list" id="barsList"></div>

  <button class="add-btn" onclick="addBar()">
    <span>＋</span> Ajouter un bar
  </button>

  <button class="start-btn" id="startBtn" onclick="startMarathon()" disabled>
    Lancer le barathon →
  </button>
</div>

<!-- ══════════ MARATHON SCREEN ══════════ -->

<div id="marathon">
  <div class="marathon-header">
    <div class="marathon-logo">bara<span>thon</span></div>
    <div style="font-size:0.8rem; color:var(--muted); font-family:'Syne',sans-serif; font-weight:600;" id="headerTime"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span class="progress-label">Progression</span>
      <span class="progress-count" id="progressCount"><span>0</span>/0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="current-bar-wrap">
    <div class="current-label">📍 Stop actuel</div>
    <div class="current-card" id="currentCard">
      <div class="current-bar-num" id="currentNum">1</div>
      <div class="current-bar-name" id="currentName">—</div>
      <button class="checkin-btn" id="checkinBtn" onclick="checkIn()">
        ✓ &nbsp;Check-in ici
      </button>
    </div>
  </div>

  <div class="bars-scroll">
    <div class="bars-scroll-label">Parcours complet</div>
    <div id="barItemsList"></div>
  </div>
</div>

<!-- ══════════ CELEBRATION POPUP ══════════ -->

<div id="celebration">
  <div class="celebration-emoji" id="celebEmoji">🍻</div>
  <div class="celebration-title" id="celebTitle">Check-in <span>validé !</span></div>
  <div class="celebration-sub" id="celebSub">Direction le prochain stop !</div>
  <button class="celebration-close" onclick="closeCelebration()">Continuer →</button>
</div>

<!-- ══════════ FINISH SCREEN ══════════ -->

<div id="finish">
  <div class="finish-trophy">🏆</div>
  <div class="finish-title">Barathon<br><span>terminé !</span></div>
  <div class="finish-sub">Tu as survécu à</div>
  <div class="finish-bars" id="finishCount">0</div>
  <div class="finish-bars-label">bars 🍺</div>
  <button class="restart-btn" onclick="restart()">Recommencer un barathon</button>
</div>

<script>
let bars = [];
let currentIndex = 0;
let completedCount = 0;
let startTime = null;

// ─── Init setup ───
window.onload = () => {
  addBar(); addBar(); addBar();
  updateStartBtn();
  setInterval(updateTime, 1000);
};

function addBar() {
  const id = Date.now() + Math.random();
  bars.push({ id, name: '' });
  renderBars();
}

function removeBar(id) {
  if (bars.length <= 1) return;
  bars = bars.filter(b => b.id !== id);
  renderBars();
}

function renderBars() {
  const list = document.getElementById('barsList');
  list.innerHTML = '';
  bars.forEach((bar, i) => {
    const div = document.createElement('div');
    div.className = 'bar-entry';
    div.innerHTML = `
      <span class="bar-num">${String(i+1).padStart(2,'0')}</span>
      <input type="text" placeholder="Nom du bar..." value="${bar.name}"
        oninput="updateBarName('${bar.id}', this.value)"
        onkeydown="if(event.key==='Enter') { event.preventDefault(); document.querySelectorAll('.bar-entry input')[${i+1}]?.focus(); }"
      >
      <button class="del-btn" onclick="removeBar('${bar.id}')">×</button>
    `;
    list.appendChild(div);
  });
  updateStartBtn();
}

function updateBarName(id, val) {
  const bar = bars.find(b => b.id == id);
  if (bar) bar.name = val.trim();
  updateStartBtn();
}

function updateStartBtn() {
  const filled = bars.filter(b => b.name.length > 0);
  document.getElementById('startBtn').disabled = filled.length < 2;
}

// ─── Start marathon ───
function startMarathon() {
  bars = bars.filter(b => b.name.length > 0);
  if (bars.length < 2) return;
  currentIndex = 0;
  completedCount = 0;
  startTime = Date.now();

  document.getElementById('setup').style.display = 'none';
  document.getElementById('marathon').style.display = 'flex';

  renderMarathon();
}

function renderMarathon() {
  // Progress
  document.getElementById('progressCount').innerHTML =
    `<span>${completedCount}</span>/${bars.length}`;
  document.getElementById('progressFill').style.width =
    `${(completedCount / bars.length) * 100}%`;

  // Current bar
  if (currentIndex < bars.length) {
    const bar = bars[currentIndex];
    document.getElementById('currentNum').textContent = currentIndex + 1;
    document.getElementById('currentName').textContent = bar.name;

    const btn = document.getElementById('checkinBtn');
    btn.className = 'checkin-btn';
    btn.textContent = '✓  Check-in ici';
    btn.onclick = checkIn;

    // Reanimate card
    const card = document.getElementById('currentCard');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'heroIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
  }

  // Full list
  renderBarItems();
}

function renderBarItems() {
  const list = document.getElementById('barItemsList');
  list.innerHTML = '';
  bars.forEach((bar, i) => {
    const div = document.createElement('div');
    let cls = 'bar-item ';
    let icon = '';
    if (i < currentIndex) {
      cls += 'completed';
      icon = '✓';
    } else if (i === currentIndex) {
      cls += 'active';
      icon = '📍';
    } else {
      cls += 'locked';
      icon = '🔒';
    }
    div.className = cls;
    div.innerHTML = `
      <span class="bar-item-num">${String(i+1).padStart(2,'0')}</span>
      <span class="bar-item-name">${bar.name}</span>
      <span class="bar-item-icon">${icon}</span>
    `;
    list.appendChild(div);
  });
}

function checkIn() {
  completedCount++;
  
  // Last bar?
  const isLast = currentIndex === bars.length - 1;

  if (isLast) {
    launchConfetti();
    setTimeout(() => {
      document.getElementById('marathon').style.display = 'none';
      document.getElementById('finish').style.display = 'flex';
      document.getElementById('finishCount').textContent = bars.length;
    }, 600);
    return;
  }

  // Show celebration
  const nextBar = bars[currentIndex + 1];
  const emojis = ['🍻','🎉','⚡','🔥','💥','🙌'];
  document.getElementById('celebEmoji').textContent =
    emojis[Math.floor(Math.random() * emojis.length)];
  document.getElementById('celebTitle').innerHTML =
    `Check-in <span>validé !</span>`;
  document.getElementById('celebSub').textContent =
    `Prochain stop : ${nextBar.name}`;

  const cel = document.getElementById('celebration');
  cel.style.display = 'flex';

  currentIndex++;
  renderMarathon();
}

function closeCelebration() {
  document.getElementById('celebration').style.display = 'none';
}

function updateTime() {
  if (!startTime) return;
  const el = document.getElementById('headerTime');
  if (!el) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const s = elapsed % 60;
  const pad = n => String(n).padStart(2, '0');
  el.textContent = h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function launchConfetti() {
  const colors = ['#f0c040','#e87040','#70c8f0','#f070a0','#90d870'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

function restart() {
  bars = [];
  currentIndex = 0;
  completedCount = 0;
  startTime = null;
  document.getElementById('finish').style.display = 'none';
  document.getElementById('marathon').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  addBar(); addBar(); addBar();
  updateStartBtn();
}
</script>

</body>
</html>
